# CI: backend (Ruff, pytest serviços) + frontend (lint, Vitest, build, Playwright E2E).
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  docker-images:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t loja-backend:ci ./backend
      - name: Build frontend image (standalone)
        run: docker build -t loja-frontend:ci --build-arg NEXT_PUBLIC_API_URL=http://127.0.0.1:8000 ./frontend

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Instalar dependências
        run: pip install -r requirements.txt
      - name: Ruff
        run: ruff check app tests
      - name: Pytest + cobertura serviços
        run: pytest tests/ -q --cov=app/services --cov-fail-under=90

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Instalar dependências
        run: npm ci
      - name: ESLint
        run: npm run lint
      - name: Vitest
        run: npm run test
      - name: Build (Next standalone)
        run: npm run build
      - name: Playwright (Chromium)
        run: npx playwright install --with-deps chromium
      - name: E2E smoke
        run: npm run test:e2e
        env:
          PW_SERVER_ONLY: "1"
